<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiPAS — User Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4ff; --surface: #ffffff; --surface2: #f5f7ff; --surface3: #eaefff;
    --border: #dce3f5; --accent: #4f7cff; --accent2: #7c4fff; --accent3: #ff4f7c;
    --green: #0ea870; --yellow: #d4920a; --red: #e03444;
    --text: #0f1535; --text2: #5a6490; --text3: #a0aac8;
    --radius: 16px; --radius-sm: 10px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 40% at 90% 0%, rgba(79,124,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 0% 100%, rgba(124,79,255,0.06) 0%, transparent 60%);
  }

  /* LOGIN SCREEN */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1; padding: 20px;
  }
  .login-box {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 24px;
    padding: 44px 40px; width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(79,124,255,.1);
    animation: fadeUp .6s ease both;
  }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .login-logo-icon { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg,var(--accent),var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .login-logo-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  .login-logo-sub { font-size: 10px; color: var(--text2); letter-spacing: 1.5px; text-transform: uppercase; }
  .login-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

  /* HEADER */
  .header {
    background: var(--surface); border-bottom: 1.5px solid var(--border);
    padding: 0 28px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(79,124,255,.06);
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .header-logo-icon { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg,var(--accent),var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .header-logo-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); }
  .header-user { display: flex; align-items: center; gap: 10px; }
  .user-chip { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 20px; padding: 5px 14px 5px 6px; font-size: 13px; }
  .user-chip-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg,var(--accent2),var(--accent3)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }

  /* TABS NAV */
  .tab-nav { display: flex; gap: 0; background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 0 28px; }
  .tab-nav-btn {
    padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--text2);
    background: transparent; border: none; cursor: pointer;
    border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; transition: all .2s;
    font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px;
  }
  .tab-nav-btn:hover { color: var(--text); }
  .tab-nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* CONTENT */
  .content { max-width: 900px; margin: 0 auto; padding: 28px 20px; position: relative; z-index: 1; }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; animation: fadeIn .2s ease; }

  /* CARD */
  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(79,124,255,.05); }
  .card-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: .4px; text-transform: uppercase; margin-bottom: 7px; }
  .form-control {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 13.5px; padding: 10px 13px; outline: none; transition: all .2s;
  }
  .form-control:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(79,124,255,.1); }
  select.form-control option { background: #fff; }
  textarea.form-control { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .req { color: var(--accent3); }

  /* BUTTON */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600;
    padding: 10px 22px; border-radius: var(--radius-sm); border: none; cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 20px rgba(79,124,255,.25); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(79,124,255,.4); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 6px 13px; font-size: 11px; }
  .btn-block { width: 100%; }
  .btn-logout { background: transparent; border: 1.5px solid var(--border); color: var(--text2); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 12px; cursor: pointer; transition: all .2s; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* STATUS CARD */
  .pengajuan-card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; margin-bottom: 12px;
    transition: box-shadow .2s, border-color .2s;
    cursor: pointer;
  }
  .pengajuan-card:hover { border-color: rgba(79,124,255,.3); box-shadow: 0 4px 20px rgba(79,124,255,.08); }
  .pgj-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .pgj-id { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
  .pgj-meta { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .pgj-progress { margin-top: 12px; }
  .progress-steps { display: flex; align-items: center; gap: 0; }
  .step {
    display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
    position: relative;
  }
  .step::before {
    content: ''; position: absolute; top: 13px; left: 50%; right: -50%;
    height: 2px; background: var(--border); z-index: 0;
  }
  .step:last-child::before { display: none; }
  .step.done::before { background: var(--accent); }
  .step-dot {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border);
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    font-size: 11px; z-index: 1; position: relative; transition: all .2s;
  }
  .step.done .step-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
  .step.active .step-dot { background: #fff; border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 3px rgba(79,124,255,.15); }
  .step.rejected .step-dot { background: var(--red); border-color: var(--red); color: #fff; }
  .step-label { font-size: 9px; color: var(--text3); font-weight: 500; text-align: center; }
  .step.done .step-label, .step.active .step-label { color: var(--accent); }
  .step.rejected .step-label { color: var(--red); }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .b-pending { background: rgba(212,146,10,.1); color: var(--yellow); }
  .b-approved { background: rgba(14,168,112,.12); color: var(--green); }
  .b-rejected { background: rgba(224,52,68,.1); color: var(--red); }
  .b-inprogress { background: rgba(79,124,255,.12); color: var(--accent); }
  .b-done { background: rgba(14,168,112,.15); color: var(--green); }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; background: var(--surface3); color: var(--text2); }
  .chip-aset { background: rgba(79,124,255,.1); color: var(--accent); }
  .chip-akses { background: rgba(124,79,255,.1); color: var(--accent2); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(15,21,53,.5); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
  .modal { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 28px; width: 100%; max-width: 540px; max-height: 88vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(79,124,255,.15); animation: fadeUp .25s ease; }
  .modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .modal-close { width: 30px; height: 30px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .d-item label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 3px; font-weight: 600; }
  .d-item span { font-size: 13px; }
  .timeline { padding: 4px 0; }
  .tl-item { display: flex; gap: 12px; padding-bottom: 16px; position: relative; }
  .tl-item::before { content: ''; position: absolute; left: 17px; top: 30px; bottom: 0; width: 1px; background: var(--border); }
  .tl-item:last-child::before { display: none; }
  .tl-dot { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .tl-dot.pending { background: rgba(212,146,10,.15); }
  .tl-dot.approved { background: rgba(14,168,112,.15); }
  .tl-dot.rejected { background: rgba(224,52,68,.1); }
  .tl-dot.inprogress { background: rgba(79,124,255,.12); }
  .tl-body { flex: 1; }
  .tl-title { font-size: 12.5px; font-weight: 600; color: var(--text); }
  .tl-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* EMPTY */
  .empty { text-align: center; padding: 52px 20px; color: var(--text3); }
  .empty .ei { font-size: 44px; margin-bottom: 12px; }
  .empty p { font-size: 13px; }

  /* TOAST */
  #toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: 12px; padding: 11px 16px; font-size: 13px; box-shadow: 0 8px 32px rgba(79,124,255,.15); transform: translateX(120%); transition: transform .3s ease; max-width: 280px; }
  #toast.show { transform: translateX(0); }
  #toast.err { border-left-color: var(--red); }

  /* RT */
  .rt-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; color: var(--green); background: rgba(14,168,112,.1); border: 1px solid rgba(14,168,112,.2); border-radius: 20px; padding: 3px 10px; }
  .rt-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
  .spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .detail-grid { grid-template-columns: 1fr; } .content { padding: 16px 12px; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">👤</div>
      <div>
        <div class="login-logo-name">SiPAS</div>
        <div class="login-logo-sub">User Portal</div>
      </div>
    </div>
    <div class="login-title">Masuk ke Portal</div>
    <div class="login-sub">Gunakan nama lengkap Anda untuk mengakses pengajuan</div>
    <div class="form-group">
      <label class="form-label">Nama Lengkap <span class="req">*</span></label>
      <input id="loginName" class="form-control" placeholder="Contoh: Budi Santoso" style="font-size:15px;padding:12px 14px">
    </div>
    <div class="form-group">
      <label class="form-label">Departemen</label>
      <select id="loginDept" class="form-control" style="font-size:15px;padding:12px 14px">
        <option>IT</option><option>Finance</option><option>HR</option>
        <option>Marketing</option><option>Operations</option><option>Sales</option>
      </select>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:8px;padding:13px" onclick="doLogin()">Masuk →</button>
    <div style="margin-top:16px;text-align:center"><a href="index.html" style="font-size:12px;color:var(--text3);text-decoration:none">← Kembali ke halaman utama</a></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" style="display:none">
  <header class="header">
    <div class="header-logo">
      <div class="header-logo-icon">👤</div>
      <div class="header-logo-name">SiPAS User</div>
    </div>
    <div class="header-user">
      <div class="rt-badge"><div class="rt-dot"></div>Realtime</div>
      <div class="user-chip">
        <div class="user-chip-avatar" id="avatarEl">B</div>
        <span id="nameEl">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </header>

  <div class="tab-nav">
    <button class="tab-nav-btn active" onclick="switchTab(this,'tab-status')">📊 Status Pengajuan</button>
    <button class="tab-nav-btn" onclick="switchTab(this,'tab-aset')">📦 Ajukan Aset</button>
    <button class="tab-nav-btn" onclick="switchTab(this,'tab-akses')">🔐 Ajukan Akses</button>
  </div>

  <div class="content">

    <!-- STATUS -->
    <div class="tab-pane active" id="tab-status">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700">Pengajuan Saya</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">Monitor status pengajuan Anda secara real-time</div>
        </div>
      </div>
      <div id="statusList"><div class="loading"><div class="spinner"></div><br>Memuat data...</div></div>
    </div>

    <!-- FORM ASET -->
    <div class="tab-pane" id="tab-aset">
      <div class="card">
        <div class="card-title">📦 Formulir Pengajuan Aset</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Jenis Aset <span class="req">*</span></label>
            <select id="a-jenis" class="form-control">
              <option value="">-- Pilih Jenis --</option>
              <option>Laptop / Komputer</option><option>Monitor</option><option>Mouse & Keyboard</option>
              <option>Printer / Scanner</option><option>Headset</option><option>Kendaraan Dinas</option>
              <option>Proyektor</option><option>Telepon / HP</option><option>Lainnya</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Prioritas</label>
            <select id="a-prioritas" class="form-control"><option>Normal</option><option>Tinggi</option><option>Mendesak</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Dibutuhkan Tanggal</label>
            <input type="date" id="a-tgl" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Departemen</label>
            <input id="a-dept" class="form-control" readonly style="background:var(--surface3)">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Spesifikasi / Keterangan</label>
          <textarea id="a-spec" class="form-control" placeholder="Tulis spesifikasi yang dibutuhkan (merk, ukuran, kapasitas, dll)..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Alasan / Justifikasi <span class="req">*</span></label>
          <textarea id="a-alasan" class="form-control" placeholder="Jelaskan mengapa aset ini dibutuhkan untuk pekerjaan Anda..."></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button class="btn btn-ghost" onclick="resetAset()">Reset</button>
          <button class="btn btn-primary" onclick="submitAset()">Kirim Pengajuan →</button>
        </div>
      </div>
    </div>

    <!-- FORM AKSES -->
    <div class="tab-pane" id="tab-akses">
      <div class="card">
        <div class="card-title">🔐 Formulir Pengajuan Akses</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Sistem / Aplikasi <span class="req">*</span></label>
            <select id="k-jenis" class="form-control">
              <option value="">-- Pilih Sistem --</option>
              <option>ERP / SAP</option><option>CRM Salesforce</option><option>Sistem Absensi</option>
              <option>Database Server</option><option>Git / Source Control</option>
              <option>Cloud Storage</option><option>Email Corporate</option>
              <option>VPN</option><option>Admin Panel</option><option>Lainnya</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Level Akses</label>
            <select id="k-level" class="form-control"><option>Read Only</option><option>Read & Write</option><option>Full Access</option><option>Admin</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Durasi Akses</label>
            <select id="k-durasi" class="form-control"><option>Permanen</option><option>1 Bulan</option><option>3 Bulan</option><option>6 Bulan</option><option>1 Tahun</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">Departemen</label>
            <input id="k-dept" class="form-control" readonly style="background:var(--surface3)">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Alasan / Justifikasi <span class="req">*</span></label>
          <textarea id="k-alasan" class="form-control" placeholder="Jelaskan mengapa akses ini dibutuhkan dan untuk keperluan apa..."></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button class="btn btn-ghost" onclick="resetAkses()">Reset</button>
          <button class="btn btn-primary" onclick="submitAkses()">Kirim Pengajuan →</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalDetail">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="detailTitle">Detail Pengajuan</div>
      <button class="modal-close" onclick="closeModal('modalDetail')">✕</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkekmRzcYhnSnd64i7uhmpatOFmAinAzc",
  authDomain: "sipas-db.firebaseapp.com",
  databaseURL: "https://sipas-db-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sipas-db",
  storageBucket: "sipas-db.firebasestorage.app",
  messagingSenderId: "19462583705",
  appId: "1:19462583705:web:26b3c8649701eba7f78f08",
  measurementId: "G-PZ736619S4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'pengajuan');

let currentUser = null;
let allData = {};

// ── LOGIN ──
window.doLogin = function() {
  const name = document.getElementById('loginName').value.trim();
  if (!name) { toast('Masukkan nama Anda', true); return; }
  const dept = document.getElementById('loginDept').value;
  currentUser = { name, dept, avatar: name[0].toUpperCase() };
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('nameEl').textContent = name;
  document.getElementById('avatarEl').textContent = currentUser.avatar;
  document.getElementById('a-dept').value = dept;
  document.getElementById('k-dept').value = dept;
  document.getElementById('a-tgl').value = today();
  startListener();
};

window.doLogout = function() {
  currentUser = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginName').value = '';
};

// ── REALTIME ──
function startListener() {
  onValue(dbRef, (snap) => {
    allData = snap.val() || {};
    renderStatus();
  });
}

// ── STATUS LIST ──
function renderStatus() {
  const myData = Object.entries(allData)
    .map(([k,v])=>({...v,key:k}))
    .filter(p=>p.pengaju===currentUser.name)
    .sort((a,b)=>(b.ts||0)-(a.ts||0));

  const el = document.getElementById('statusList');
  if (!myData.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📭</div><p>Belum ada pengajuan.<br>Buat pengajuan baru melalui tab di atas.</p></div>`;
    return;
  }

  el.innerHTML = myData.map(p => {
    const steps = ['Diajukan','Disetujui','Diproses','Selesai'];
    const isRejected = p.status === 'Ditolak';
    const currentIdx = isRejected ? 1 : steps.indexOf(p.status);
    const icons = ['📝','✅','⚙️','🎉'];

    const stepsHtml = steps.map((s,i) => {
      let cls = '';
      if (isRejected && i === 1) cls = 'rejected';
      else if (i < currentIdx) cls = 'done';
      else if (i === currentIdx) cls = 'active';
      const icon = (isRejected && i===1) ? '❌' : (i<=currentIdx ? icons[i] : '○');
      const label = (isRejected && i===1) ? 'Ditolak' : s;
      return `<div class="step ${cls}"><div class="step-dot">${icon}</div><div class="step-label">${label}</div></div>`;
    }).join('');

    return `<div class="pengajuan-card" onclick="openDetail('${p.key}')">
      <div class="pgj-header">
        <div>
          <div class="pgj-id">${p.id} <span class="chip chip-${p.tipe==='Aset'?'aset':'akses'}" style="margin-left:4px">${p.tipe}</span></div>
          <div class="pgj-meta">${p.jenis} · ${fmtDate(p.tanggal)}</div>
        </div>
        ${statusBadge(p.status)}
      </div>
      <div class="pgj-progress">
        <div class="progress-steps">${stepsHtml}</div>
      </div>
      ${isRejected && p.riwayat ? `<div style="margin-top:10px;padding:8px 12px;background:rgba(224,52,68,.07);border-radius:8px;font-size:12px;color:var(--red)">❌ ${p.riwayat[p.riwayat.length-1]?.note||'Ditolak'}</div>` : ''}
    </div>`;
  }).join('');
}

// ── SUBMIT ──
window.submitAset = async function() {
  const jenis = document.getElementById('a-jenis').value;
  const alasan = document.getElementById('a-alasan').value.trim();
  if (!jenis) { toast('Pilih jenis aset', true); return; }
  if (!alasan) { toast('Isi alasan pengajuan', true); return; }
  const id = genId();
  await push(dbRef, {
    id, tipe:'Aset', jenis, alasan,
    pengaju: currentUser.name,
    dept: currentUser.dept,
    prioritas: document.getElementById('a-prioritas').value,
    spesifikasi: document.getElementById('a-spec').value,
    tanggal: today(), status:'Pending', ts: Date.now(),
    riwayat: [{ act:'Diajukan', by: currentUser.name, tgl: today(), note:'' }]
  });
  resetAset();
  toast(`✅ Pengajuan ${id} berhasil dikirim! Menunggu approval admin.`);
  switchTabById('tab-status');
};

window.submitAkses = async function() {
  const jenis = document.getElementById('k-jenis').value;
  const alasan = document.getElementById('k-alasan').value.trim();
  if (!jenis) { toast('Pilih sistem/aplikasi', true); return; }
  if (!alasan) { toast('Isi alasan pengajuan', true); return; }
  const id = genId();
  await push(dbRef, {
    id, tipe:'Akses', jenis, alasan,
    pengaju: currentUser.name,
    dept: currentUser.dept,
    level: document.getElementById('k-level').value,
    durasi: document.getElementById('k-durasi').value,
    tanggal: today(), status:'Pending', ts: Date.now(),
    riwayat: [{ act:'Diajukan', by: currentUser.name, tgl: today(), note:'' }]
  });
  resetAkses();
  toast(`✅ Pengajuan ${id} berhasil dikirim! Menunggu approval admin.`);
  switchTabById('tab-status');
};

window.resetAset = function() {
  document.getElementById('a-jenis').value='';
  document.getElementById('a-spec').value='';
  document.getElementById('a-alasan').value='';
  document.getElementById('a-prioritas').value='Normal';
};
window.resetAkses = function() {
  document.getElementById('k-jenis').value='';
  document.getElementById('k-alasan').value='';
};

// ── DETAIL ──
window.openDetail = function(key) {
  const p = allData[key];
  if (!p) return;
  document.getElementById('detailTitle').textContent = `${p.tipe==='Aset'?'📦':'🔐'} ${p.id}`;
  const fields = p.tipe==='Aset'
    ? [{l:'ID',v:p.id},{l:'Status',v:statusBadge(p.status)},{l:'Jenis',v:p.jenis},{l:'Prioritas',v:p.prioritas||'Normal'},{l:'Departemen',v:p.dept},{l:'Tanggal Ajuan',v:fmtDate(p.tanggal)},{l:'Spesifikasi',v:p.spesifikasi||'-'}]
    : [{l:'ID',v:p.id},{l:'Status',v:statusBadge(p.status)},{l:'Aplikasi',v:p.jenis},{l:'Level Akses',v:p.level||'-'},{l:'Durasi',v:p.durasi||'-'},{l:'Tanggal Ajuan',v:fmtDate(p.tanggal)}];

  const icons={Diajukan:'📝',Disetujui:'✅',Ditolak:'❌',Diproses:'⚙️',Selesai:'🎉'};
  const cls={Diajukan:'pending',Disetujui:'approved',Ditolak:'rejected',Diproses:'inprogress',Selesai:'approved'};
  const timeline=(p.riwayat||[]).map(r=>`<div class="tl-item"><div class="tl-dot ${cls[r.act]||'pending'}">${icons[r.act]||'•'}</div><div class="tl-body"><div class="tl-title">${r.act} <span style="color:var(--text2);font-weight:400">oleh ${r.by}</span></div><div class="tl-meta">${r.tgl}${r.note?' · '+r.note:''}</div></div></div>`).join('');

  document.getElementById('detailContent').innerHTML=`
    <div class="detail-grid">${fields.map(f=>`<div class="d-item"><label>${f.l}</label><span>${f.v}</span></div>`).join('')}</div>
    <div class="d-item" style="margin-bottom:16px"><label>Alasan</label><div style="background:var(--surface2);border-radius:8px;padding:10px;font-size:13px;color:var(--text2);margin-top:4px">${p.alasan||'-'}</div></div>
    <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600">Riwayat Proses</div>
    <div class="timeline">${timeline}</div>`;
  openModal('modalDetail');
};

// ── HELPERS ──
function genId() { return 'PGJ-' + Date.now().toString(36).toUpperCase(); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { return d||'-'; }
function statusBadge(s) {
  const m={Pending:'b-pending',Disetujui:'b-approved',Ditolak:'b-rejected',Diproses:'b-inprogress',Selesai:'b-done'};
  return `<span class="badge ${m[s]||'b-pending'}">${s}</span>`;
}

let toastTimer;
function toast(msg, isErr=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show'+(isErr?' err':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='';},3500);
}
window.toast=toast;
window.openModal=function(id){document.getElementById(id).classList.add('open');};
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};

window.switchTab=function(btn,paneId){
  document.querySelectorAll('.tab-nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById(paneId).classList.add('active');
};
function switchTabById(paneId){
  document.querySelectorAll('.tab-nav-btn').forEach((b,i)=>{
    const targets=['tab-status','tab-aset','tab-akses'];
    b.classList.toggle('active', targets[i]===paneId);
  });
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById(paneId).classList.add('active');
}

document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});

document.getElementById('loginName').addEventListener('keydown', e => {
  if(e.key==='Enter') window.doLogin();
});
</script>
